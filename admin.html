<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch Dashboard - Heavy Haul Move Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- ENV_PLACEHOLDER_START -->
    <script id="env-script">
      window.__ENV__ = {
        SUPABASE_URL: '__SUPABASE_URL__',
        SUPABASE_ANON_KEY: '__SUPABASE_ANON_KEY__'
      };
    </script>
    <!-- ENV_PLACEHOLDER_END -->
</head>
<body>
    <div id="loginSection" class="login-container">
        <div class="login-box">
            <h1>Heavy Haul Move Control</h1>
            <p>Sign in to access the Dispatch Dashboard</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
                <div id="loginError" class="error-message"></div>
            </form>
        </div>
    </div>

    <div id="adminDashboard" class="app-container" style="display: none;">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>Heavy Haul</h2>
                <p>Move Control System</p>
            </div>
            <ul class="nav-links">
                <li><a href="/admin" class="active">Dashboard</a></li>
                <li><a href="/permits">Permit Tracker</a></li>
                <li><a href="/documents">Documents</a></li>
                <li><a href="/">Move Intake</a></li>
            </ul>
            <button id="logoutBtn" class="logout-btn-sidebar">Logout</button>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <h1>Dispatch Dashboard</h1>
            </header>

            <!-- KPI Strip -->
            <div class="kpi-strip">
                <div class="kpi-card">
                    <div class="kpi-value" id="activeMoves">0</div>
                    <div class="kpi-label">Active Moves</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value" id="pendingPermits">0</div>
                    <div class="kpi-label">Pending Permits</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value" id="movesReady">0</div>
                    <div class="kpi-label">Moves Ready</div>
                </div>
                <div class="kpi-card at-risk">
                    <div class="kpi-value" id="atRiskMoves">0</div>
                    <div class="kpi-label">At-Risk Moves</div>
                </div>
            </div>

            <!-- Moves Grid -->
            <div class="moves-section">
                <h2>All Moves</h2>
                <div class="moves-grid" id="movesGrid">
                    <div class="loading">Loading moves...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Supabase SDK (loaded from CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>
